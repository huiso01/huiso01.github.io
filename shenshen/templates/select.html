<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择数据完整度 - 糖尿病风险预测</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f7ff; padding: 20px; }
        .container { max-width: 1000px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 50px; }
        h1 { color: #2c6e9e; border-left: 5px solid #2c6e9e; padding-left: 20px; margin-bottom: 30px; }
        .option-card { cursor: pointer; transition: 0.2s; border: 2px solid #dee2e6; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .option-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .option-card.selected { border-color: #2c6e9e; background-color: #e9f0f5; }
        .btn-submit { background: #2c6e9e; border: none; padding: 12px 40px; font-size: 1.2rem; border-radius: 40px; margin-top: 20px; }
        .metric-badge { background: #e3f2fd; border-radius: 12px; padding: 8px 12px; margin: 5px; display: inline-block; }
        footer { text-align: center; margin-top: 40px; color: #6c757d; }
    </style>
</head>
<body>
<div class="container">
    <h1>🩺 糖早慧—糖尿病风险管理系统</h1>

    {% if metrics %}
        <div class="alert alert-info">
            <strong>📊 请选择您能提供的资料完整度（系统将自动填充缺失信息）          </strong><br>
        </div>
        {% endif %}
            
    <form action="/form" method="post">
        <div class="row">
            <div class="col-md-4">
                <div class="option-card" data-opt="1">
                    <h5>📋 选项一：基础信息</h5>
                    <p>年龄、性别、身高、收缩压、舒张压、心率</p>
                    <small class="text-muted">普适快捷的评析</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="option-card" data-opt="2">
                    <h5>🔬 选项二：基础信息+生化指标</h5>
                    <p>基础信息+血脂、胰岛素、血糖、HbA1c等生化指标</p>
                    <small class="text-muted">适中全面的考量</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="option-card" data-opt="3">
                    <h5>📊 选项三：基础信息+生化指标+基因多态性</h5>
                    <p>包含基因、临床病史、生化、血糖等所有指标</p>
                    <small class="text-muted">最精准的评估</small>
                </div>
            </div>
        </div>
        
        <input type="hidden" name="option" id="option" value="3">
        
        <div class="text-center">
            <button type="submit" class="btn btn-primary btn-submit">下一步：填写信息 →</button>
        </div>
    </form>
    <footer>选择后点击下一步，根据您选择的完整度填写对应信息</footer>
</div>

<script>
    const cards = document.querySelectorAll('.option-card');
    const optionInput = document.getElementById('option');
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const opt = card.dataset.opt;
            optionInput.value = opt;
            cards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
        });
    });
    // 默认选中选项三
    document.querySelector('.option-card[data-opt="3"]').classList.add('selected');
</script>
</body>
</html>
